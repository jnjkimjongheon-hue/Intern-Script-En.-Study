<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 - The Intern Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
    <main class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">회원가입</h1>
        <p class="text-sm text-slate-500 mb-6">새 계정을 생성하세요.</p>

        <form id="signup-form" class="space-y-4">
            <div>
                <label for="signup-name" class="block text-sm font-semibold text-slate-700 mb-1">이름</label>
                <input id="signup-name" type="text" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-teal-600" placeholder="홍길동">
            </div>
            <div>
                <label for="signup-email" class="block text-sm font-semibold text-slate-700 mb-1">이메일</label>
                <input id="signup-email" type="email" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-teal-600" placeholder="you@example.com">
            </div>
            <div>
                <label for="signup-password" class="block text-sm font-semibold text-slate-700 mb-1">비밀번호</label>
                <input id="signup-password" type="password" class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-teal-600" placeholder="8자 이상 입력">
            </div>
            <button id="signup-submit-btn" type="submit" class="w-full py-3 bg-teal-700 text-white font-bold rounded-xl hover:bg-teal-800 transition-colors">회원가입</button>
        </form>
        <p id="signup-message" class="text-sm mt-4 text-center hidden"></p>

        <a href="./login.html" class="block text-center text-sm text-slate-500 mt-6 hover:text-slate-700">로그인으로 돌아가기</a>
    </main>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, updateProfile } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAX0nQdaC7vkLAOGDize2q5gRlagSRlo6k",
            authDomain: "english-study-b3253.firebaseapp.com",
            databaseURL: "https://english-study-b3253-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "english-study-b3253",
            storageBucket: "english-study-b3253.firebasestorage.app",
            messagingSenderId: "429046264345",
            appId: "1:429046264345:web:9c3fef7f3a606f261bb088"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById('signup-form');
        const submitBtn = document.getElementById('signup-submit-btn');
        const messageEl = document.getElementById('signup-message');

        function showMessage(text, type = 'error') {
            messageEl.textContent = text;
            messageEl.classList.remove('hidden', 'text-red-600', 'text-emerald-600');
            messageEl.classList.add(type === 'success' ? 'text-emerald-600' : 'text-red-600');
        }

        function getKoreanErrorMessage(errorCode) {
            const map = {
                'auth/email-already-in-use': '이미 사용 중인 이메일입니다.',
                'auth/invalid-email': '이메일 형식이 올바르지 않습니다.',
                'auth/weak-password': '비밀번호는 6자 이상이어야 합니다.',
                'auth/network-request-failed': '네트워크 오류가 발생했습니다. 다시 시도해주세요.'
            };
            return map[errorCode] || '회원가입 중 오류가 발생했습니다. 잠시 후 다시 시도해주세요.';
        }

        form.addEventListener('submit', async (event) => {
            event.preventDefault();

            const name = document.getElementById('signup-name').value.trim();
            const email = document.getElementById('signup-email').value.trim();
            const password = document.getElementById('signup-password').value;

            if (!name || !email || !password) {
                showMessage('이름, 이메일, 비밀번호를 모두 입력해주세요.');
                return;
            }

            submitBtn.disabled = true;
            submitBtn.classList.add('opacity-70', 'cursor-not-allowed');

            try {
                const credential = await createUserWithEmailAndPassword(auth, email, password);
                await updateProfile(credential.user, { displayName: name });
                showMessage('회원가입이 완료되었습니다. 로그인 페이지로 이동합니다.', 'success');
                setTimeout(() => {
                    window.location.href = './login.html';
                }, 1200);
            } catch (error) {
                showMessage(getKoreanErrorMessage(error.code));
            } finally {
                submitBtn.disabled = false;
                submitBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        });
    </script>
</body>
</html>
