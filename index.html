    <script>
        // --- Timezone Bug Fix: 로컬 타임존 기반 날짜 생성 ---
        function getLocalDateStr(dateObj = new Date()) {
            const year = dateObj.getFullYear();
            const month = String(dateObj.getMonth() + 1).padStart(2, '0');
            const day = String(dateObj.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        // --- Core Data & Setup ---
        const TOTAL_PAGES = 73;
        const PAGES_PER_DAY = 2;
        const DAY_MS = 86400000;
        
        // 명언 및 인물 데이터 (성경 및 유명인 조합)
        const quotes = [
            { text: "시작이 반이다. (Well begun is half done.)", author: "아리스토텔레스 (Aristotle)" },
            { text: "내일 일은 내일 염려할 것이요 한 날의 괴로움은 그 날로 족하니라.", author: "마태복음 6:34" },
            { text: "성공은 매일 반복한 작은 노력들의 합이다.", author: "로버트 콜리어 (Robert Collier)" },
            { text: "네 시작은 미약하였으나 네 나중은 심히 창대하리라.", author: "욥기 8:7" },
            { text: "아무것도 하지 않으면 아무 일도 일어나지 않는다.", author: "기시미 이치로 (Ichiro Kishimi)" },
            { text: "두려워하지 말라 내가 너와 함께 함이라.", author: "이사야 41:10" },
            { text: "포기하지 마라. 한 번 포기하면 습관이 된다.", author: "빈스 롬바르디 (Vince Lombardi)" },
            { text: "구하라 그리하면 너희에게 주실 것이요.", author: "마태복음 7:7" },
            { text: "기회는 일어나는 것이 아니라 만들어내는 것이다.", author: "크리스 그로서 (Chris Grosser)" },
            { text: "성공하는 사람은 실패를 두려워하지 않는 사람이 아니라, 실패해도 다시 일어나는 사람이다.", author: "넬슨 만델라 (Nelson Mandela)" },
            { text: "우리가 선을 행하되 낙심하지 말지니 포기하지 아니하면 때가 이르매 거두리라.", author: "갈라디아서 6:9" }
        ];

        let viewDate = new Date();
        let startDateStr = localStorage.getItem('intern_start_date') || getLocalDateStr();
        let completedTasks = JSON.parse(localStorage.getItem('intern_completed')) || [];
        let categories = JSON.parse(localStorage.getItem('intern_categories')) || ['영화 대본'];
        let sentenceVault = JSON.parse(localStorage.getItem('intern_vault')) || [];
        const FIREBASE_STATE_PATH = 'internStudy/defaultState';

        function migrateVaultData(vault = []) {
            return vault.map(s => {
                if (s.memorized === true) return { ...s, memorizeCount: 3, memorized: undefined };
                if (s.memorized === false) return { ...s, memorizeCount: 0, memorized: undefined };
                if (typeof s.memorizeCount !== 'number') return { ...s, memorizeCount: 0 };
                return s;
            });
        }

        // 하위 호환성 (기존 데이터 마이그레이션)
        sentenceVault = migrateVaultData(sentenceVault);

        function persistLocalState() {
            localStorage.setItem('intern_vault', JSON.stringify(sentenceVault));
            localStorage.setItem('intern_start_date', startDateStr);
            localStorage.setItem('intern_completed', JSON.stringify(completedTasks));
            localStorage.setItem('intern_categories', JSON.stringify(categories));
        }

        async function persistRemoteState() {
            if (!window.firebaseClient) return;
            try {
                const payload = {
                    startDateStr,
                    completedTasks,
                    categories,
                    sentenceVault
                };
                await window.firebaseClient.set(
                    window.firebaseClient.ref(window.firebaseClient.db, FIREBASE_STATE_PATH),
                    payload
                );
            } catch (error) {
                console.error('Firebase save failed:', error);
            }
        }

        async function persistState() {
            persistLocalState();
            await persistRemoteState();
        }

        async function loadStateFromFirebase() {
            if (!window.firebaseClient) return;
            try {
                const snapshot = await window.firebaseClient.get(
                    window.firebaseClient.ref(window.firebaseClient.db, FIREBASE_STATE_PATH)
                );
                if (!snapshot.exists()) return;

                const data = snapshot.val() || {};
                startDateStr = data.startDateStr || startDateStr;
                completedTasks = Array.isArray(data.completedTasks) ? data.completedTasks : [];
                categories = Array.isArray(data.categories) && data.categories.length ? data.categories : ['영화 대본'];
                sentenceVault = migrateVaultData(Array.isArray(data.sentenceVault) ? data.sentenceVault : []);
                persistLocalState();
            } catch (error) {
                console.error('Firebase load failed:', error);
            }
        }

        persistLocalState();

        // 명언 상태 관리 변수
        let activeQuote = null;
        let completedDateForQuote = null;

        let editingId = null;
        let activeQuizList = [];
        let currentQuizIndex = 0;
        let isCardFlipped = false;

        // --- Tabs ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${tab}`).classList.add('active');
            document.querySelectorAll('nav button').forEach(el => el.classList.replace('text-white', 'text-slate-400'));
            document.querySelectorAll('nav button').forEach(el => el.classList.replace('border-brand', 'border-transparent'));
            const btn = document.getElementById(`tab-btn-${tab}`);
            btn.classList.replace('text-slate-400', 'text-white');
            btn.classList.replace('border-transparent', 'border-brand');
            
            if(tab === 'vault') {
                renderCategories();
                renderVault();
            }
            if(tab === 'quiz') initializeQuiz();
        }

        // --- Categories Logic ---
        function renderCategories() {
            const select = document.getElementById('sentence-tag');
            select.innerHTML = categories.map(c => `<option value="${c}">${c}</option>`).join('');
        }
        function addCategory() {
            const newCat = prompt("새로 추가할 카테고리 이름을 입력하세요:");
            if (newCat && newCat.trim() !== '') {
                if(!categories.includes(newCat.trim())) {
                    categories.push(newCat.trim());
                    persistState();
                    renderCategories();
                    document.getElementById('sentence-tag').value = newCat.trim();
                } else {
                    alert("이미 존재하는 카테고리입니다.");
                }
            }
        }
        function removeCategory() {
            const current = document.getElementById('sentence-tag').value;
            if(categories.length <= 1) return alert("최소 1개의 카테고리는 유지해야 합니다.");
            if(confirm(`'${current}' 카테고리를 목록에서 삭제하시겠습니까?\n(기존에 저장된 문장들의 태그는 유지됩니다)`)) {
                categories = categories.filter(c => c !== current);
                persistState();
                renderCategories();
            }
        }

        // --- Tracker & Schedule ---
        function getChunks() {
            let chunks = [];
            const [sy, sm, sd] = startDateStr.split('-');
            let curr = new Date(sy, sm - 1, sd); 
            curr.setHours(0,0,0,0);
            
            let p = 0;
            while (p < TOTAL_PAGES) {
                if (curr.getDay() !== 0 && curr.getDay() !== 6) {
                    let start = p + 1, end = Math.min(p + PAGES_PER_DAY, TOTAL_PAGES);
                    chunks.push({ dateStr: getLocalDateStr(curr), pages: `${start}-${end}` });
                    p = end;
                }
                curr.setDate(curr.getDate() + 1);
            }
            return chunks;
        }

        function getTasks(dateStr, chunks) {
            let tasks = [], targetTime = new Date(dateStr.split('-')[0], dateStr.split('-')[1]-1, dateStr.split('-')[2]).getTime();
            chunks.forEach(c => {
                let chunkTime = new Date(c.dateStr.split('-')[0], c.dateStr.split('-')[1]-1, c.dateStr.split('-')[2]).getTime();
                let diff = Math.round((targetTime - chunkTime) / DAY_MS);
                const idBase = `${c.dateStr}_${c.pages}`;
                
                if (diff === 0) tasks.push({ type: 'New', pages: c.pages, id: `${idBase}_new`, color: 'bg-blue-400' });
                else if (diff === 1) tasks.push({ type: '1d', pages: c.pages, id: `${idBase}_1d`, color: 'bg-emerald-400' });
                else if (diff === 7) tasks.push({ type: '7d', pages: c.pages, id: `${idBase}_7d`, color: 'bg-amber-400' });
                else if (diff === 30) tasks.push({ type: '30d', pages: c.pages, id: `${idBase}_30d`, color: 'bg-violet-400' });
            });
            const order = { '7d': 1, '1d': 2, 'New': 3, '30d': 4 };
            return tasks.sort((a, b) => order[a.type] - order[b.type]);
        }

        // 미션 체크 & 명언 트리거
        function toggleTask(id) {
            const idx = completedTasks.indexOf(id);
            const isCompleting = idx === -1;
            
            if (isCompleting) completedTasks.push(id);
            else completedTasks.splice(idx, 1);
            
            persistState();

            // 클릭한 항목의 날짜 파악하여 해당 날짜 100% 완료 여부 확인
            const dateStr = id.split('_')[0];
            const tasksForDay = getTasks(dateStr, getChunks());
            const doneCount = tasksForDay.filter(t => completedTasks.includes(t.id)).length;
            
            if (isCompleting && doneCount === tasksForDay.length) {
                // 해당 날짜 완료 시 새로운 명언 추첨
                activeQuote = quotes[Math.floor(Math.random() * quotes.length)];
                completedDateForQuote = dateStr;
            } else if (!isCompleting && dateStr === completedDateForQuote) {
                // 체크 해제 시 명언 숨김
                activeQuote = null;
                completedDateForQuote = null;
            }

            renderAll();
        }

        function renderAll() {
            const chunks = getChunks();
            const todayStr = getLocalDateStr();
            
            // 프로그레스
            let maxP = 0;
            completedTasks.forEach(id => { 
                if(id.endsWith('_new')) { 
                    const p = parseInt(id.split('_')[1].split('-')[1]); 
                    if(p > maxP) maxP = p; 
                } 
            });
            const percent = Math.round((maxP / TOTAL_PAGES) * 100);
            document.getElementById('progress-bar').style.width = percent + '%';
            document.getElementById('progress-text').textContent = `진도: ${maxP} / 73 Pages`;
            document.getElementById('progress-percent').textContent = percent + '%';
            document.getElementById('today-date-str').textContent = new Date().toLocaleDateString('ko-KR', {month:'long', day:'numeric', weekday:'short'});

            // 오늘의 미션 렌더링
            const todayTasks = getTasks(todayStr, chunks);
            const container = document.getElementById('today-tasks-container');
            const quoteContainer = document.getElementById('quote-container');
            container.innerHTML = todayTasks.length ? '' : '<span class="text-xs text-slate-400 p-2">오늘 할당된 일정이 없습니다.</span>';
            
            todayTasks.forEach(t => {
                const checked = completedTasks.includes(t.id);
                container.innerHTML += `
                    <div class="px-3 py-1.5 rounded-lg border flex items-center gap-2 ${checked ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200'} cursor-pointer" onclick="toggleTask('${t.id}')">
                        <span class="text-[9px] font-bold ${checked ? 'bg-emerald-300' : t.color} text-white px-1.5 py-0.5 rounded transition-colors">${t.type}</span>
                        <span class="text-sm font-bold ${checked ? 'text-emerald-700 line-through' : 'text-slate-700'}">p.${t.pages}</span>
                        <div class="w-4 h-4 rounded-full border-2 flex items-center justify-center ${checked ? 'border-emerald-500 bg-emerald-500' : 'border-slate-300'}">
                            ${checked ? '<span class="text-white text-[10px]">✓</span>' : ''}
                        </div>
                    </div>`;
            });

            // 완료 명언 및 인물 표시 (모든 날짜 통합)
            if(activeQuote) {
                quoteContainer.innerHTML = `
                    <div class="mt-4 p-4 bg-brand/5 border border-brand/20 rounded-xl flex items-center gap-5 animate-fade-in-up">
                        <div class="text-3xl ml-2">🎯</div>
                        <div class="flex-1">
                            <h4 class="text-brand-dark font-black text-[11px] mb-2 uppercase tracking-wide">Day Cleared! (${completedDateForQuote})</h4>
                            <p class="text-brand-dark text-sm font-black leading-relaxed break-keep">"${activeQuote.text}"</p>
                            <p class="text-[10px] text-slate-500 font-bold mt-2 text-right">- ${activeQuote.author}</p>
                        </div>
                    </div>`;
            } else {
                quoteContainer.innerHTML = '';
            }

            renderCalendar(chunks, todayStr);
            renderScheduleList(chunks, todayStr);
        }

        function renderCalendar(chunks, todayStr) {
            const grid = document.getElementById('calendar-grid');
            grid.innerHTML = '';
            const year = viewDate.getFullYear(), month = viewDate.getMonth();
            document.getElementById('calendar-month-year').textContent = `${year}.${String(month+1).padStart(2, '0')}`;
            
            const first = new Date(year, month, 1).getDay();
            const last = new Date(year, month + 1, 0).getDate();

            for(let i=0; i<first; i++) grid.innerHTML += `<div class="calendar-cell bg-slate-50/20"></div>`;

            const todayDateObj = new Date(todayStr.split('-')[0], todayStr.split('-')[1]-1, todayStr.split('-')[2]);

            for(let d=1; d<=last; d++) {
                const dateObj = new Date(year, month, d);
                const dStr = getLocalDateStr(dateObj);
                const dayTasks = getTasks(dStr, chunks);
                const isPast = dateObj < todayDateObj;
                const isToday = dStr === todayStr;

                let icon = '';
                if (dayTasks.length > 0) {
                    const done = dayTasks.filter(t => completedTasks.includes(t.id)).length;
                    if (done === dayTasks.length) icon = '<span class="text-emerald-500 bg-emerald-50 rounded text-[10px] p-0.5">✅</span>';
                    else if (isPast) icon = '<span class="text-red-500 bg-red-50 rounded text-[10px] p-0.5">❗</span>';
                    else if (isToday) icon = '<span class="text-blue-500 bg-blue-50 rounded text-[10px] p-0.5">📖</span>';
                    else icon = '<span class="text-blue-400 bg-blue-50 rounded text-[10px] p-0.5">🗓️</span>';
                }

                let dateColor = 'text-slate-600';
                if (dateObj.getDay() === 0) dateColor = 'text-red-500';
                if (dateObj.getDay() === 6) dateColor = 'text-blue-500';

                grid.innerHTML += `
                    <div class="calendar-cell p-1.5 bg-white relative ${isToday ? 'ring-2 ring-brand inset z-10' : ''}">
                        <div class="flex justify-between items-start mb-1">
                            <span class="text-[11px] font-bold ${dateColor}">${d}</span>
                            <span>${icon}</span>
                        </div>
                        <div class="flex flex-col gap-[3px]">
                            ${dayTasks.map(t => {
                                const isDone = completedTasks.includes(t.id);
                                const textColor = isDone ? 'text-slate-300 line-through' : 'text-slate-500';
                                const barColor = isDone ? 'bg-slate-200' : t.color;
                                return `
                                <div class="text-[9px] flex items-center gap-1 w-full truncate ${textColor}">
                                    <span class="w-[2.5px] h-2.5 rounded-sm ${barColor}"></span>
                                    <span>${t.type}: p.${t.pages}</span>
                                </div>`;
                            }).join('')}
                        </div>
                    </div>`;
            }
        }

        function renderScheduleList(chunks, todayStr) {
            const tbody = document.getElementById('schedule-tbody');
            tbody.innerHTML = '';
            
            const [sy, sm, sd] = startDateStr.split('-');
            let start = new Date(sy, sm - 1, sd); 
            start.setHours(0,0,0,0);
            
            for(let i=0; i<100; i++) {
                let d = new Date(start); d.setDate(d.getDate() + i);
                let dStr = getLocalDateStr(d);
                const isToday = dStr === todayStr;
                const tasks = getTasks(dStr, chunks);
                
                if(tasks.length === 0) continue;
                
                tbody.innerHTML += `
                    <tr class="border-b border-slate-50 hover:bg-slate-50 transition-colors ${isToday?'bg-brand/5 border-l-4 border-l-brand':'border-l-4 border-l-transparent'}">
                        <td class="p-3 text-[10px] text-slate-400 font-medium">W${Math.floor(i/7)+1}</td>
                        <td class="p-3 text-xs font-semibold text-slate-700">${d.toLocaleDateString('ko-KR', {month:'short', day:'numeric', weekday:'short'})} ${isToday?'<span class="ml-1 px-1 bg-brand text-white text-[9px] rounded">오늘</span>':''}</td>
                        <td class="p-3 flex flex-wrap gap-1.5 items-center">
                            ${tasks.map(t => {
                                const done = completedTasks.includes(t.id);
                                const baseClass = done 
                                    ? 'bg-emerald-50 text-emerald-500 border-emerald-200 line-through opacity-80' 
                                    : 'bg-white text-slate-600 border-slate-300 hover:bg-brand hover:text-white hover:border-brand shadow-sm';
                                return `<span onclick="toggleTask('${t.id}')" class="text-[10px] px-2 py-1 rounded border font-bold cursor-pointer transition-all ${baseClass}">${t.type} (p.${t.pages})</span>`;
                            }).join('')}
                        </td>
                    </tr>`;
            }
        }

        // --- Vault CRUD & Excel Export ---
        function saveSentence() {
            const original = document.getElementById('sentence-original').value.trim();
            const meaning = document.getElementById('sentence-meaning').value.trim();
            const applied = document.getElementById('sentence-applied').value.trim();
            const tag = document.getElementById('sentence-tag').value;
            if(!original || !meaning) return alert("대본 원문과 해석을 입력하세요.");
            
            if(editingId) {
                const idx = sentenceVault.findIndex(s => s.id === editingId);
                if(idx > -1) { sentenceVault[idx] = {...sentenceVault[idx], original, meaning, applied, tag}; }
            } else {
                sentenceVault.unshift({ id: Date.now(), original, meaning, applied, tag, memorizeCount: 0 });
            }
            persistState();
            resetVaultForm();
            renderVault();
        }

        function editSentence(id) {
            const s = sentenceVault.find(item => item.id === id);
            if(!s) return;
            editingId = id;
            document.getElementById('sentence-original').value = s.original;
            document.getElementById('sentence-meaning').value = s.meaning;
            document.getElementById('sentence-applied').value = s.applied || '';
            document.getElementById('sentence-tag').value = s.tag;
            document.getElementById('vault-form-title').textContent = "✏️ 문장 수정 모드";
            document.getElementById('vault-cancel-btn').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function deleteSentence(id) {
            if(confirm("삭제하시겠습니까?")) {
                sentenceVault = sentenceVault.filter(s => s.id !== id);
                persistState();
                renderVault();
            }
        }

        function resetVaultForm() {
            editingId = null;
            document.getElementById('sentence-original').value = '';
            document.getElementById('sentence-meaning').value = '';
            document.getElementById('sentence-applied').value = '';
            document.getElementById('vault-form-title').textContent = "📥 비즈니스 표현 추가";
            document.getElementById('vault-cancel-btn').classList.add('hidden');
        }

        function renderVault() {
            const container = document.getElementById('vault-container');
            container.innerHTML = sentenceVault.map(s => {
                const count = s.memorizeCount || 0;
                const statusBadge = count >= 3 
                    ? `<span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 border border-emerald-200 px-1.5 py-0.5 rounded">✅ 완벽 숙지</span>` 
                    : `<span class="text-[10px] font-bold text-slate-400 bg-slate-50 border px-1.5 py-0.5 rounded">진행중 (${count}/3)</span>`;
                
                return `
                <div class="bg-white p-5 rounded-2xl border border-slate-200 shadow-sm flex flex-col justify-between group relative hover:shadow-md transition-shadow">
                    <div class="absolute top-4 right-4 flex gap-1 opacity-0 group-hover:opacity-100 transition-all">
                        <button onclick="editSentence(${s.id})" class="p-1.5 hover:text-brand bg-slate-50 rounded text-xs">✏️</button>
                        <button onclick="deleteSentence(${s.id})" class="p-1.5 hover:text-red-500 bg-slate-50 rounded text-xs">🗑️</button>
                    </div>
                    <div>
                        <div class="flex items-center gap-2 mb-3">
                            <span class="text-[10px] font-black px-2 py-0.5 bg-slate-100 text-slate-600 rounded">${s.tag}</span>
                            ${statusBadge}
                        </div>
                        <div class="text-lg font-black text-slate-800 leading-tight mb-2">"${s.original}"</div>
                        <div class="text-sm font-medium text-slate-500 mb-4">${s.meaning}</div>
                    </div>
                    ${s.applied ? `<div class="p-3 bg-brand/5 border-l-4 border-brand text-xs font-semibold text-brand-dark rounded-r-xl">${s.applied}</div>` : ''}
                </div>`;
            }).join('');
        }

        // ExcelJS 내보내기
        async function exportVaultToExcel() {
            if(sentenceVault.length === 0) return alert("추출할 데이터가 없습니다.");
            
            const workbook = new ExcelJS.Workbook();
            const worksheet = workbook.addWorksheet('문장 저장소');

            worksheet.columns = [
                { header: '카테고리 (Category)', key: 'tag', width: 18 },
                { header: '대본 원문 (Original)', key: 'original', width: 50 },
                { header: '의미 (Meaning)', key: 'meaning', width: 35 },
                { header: '실무 활용 (Application)', key: 'applied', width: 50 },
                { header: '암기 상태 (Status)', key: 'status', width: 18 }
            ];

            sentenceVault.forEach(s => {
                worksheet.addRow({
                    tag: s.tag, 
                    original: s.original, 
                    meaning: s.meaning, 
                    applied: s.applied || '', 
                    status: s.memorizeCount >= 3 ? '✅ 암기 완료' : `학습중 (${s.memorizeCount||0}/3)`
                });
            });

            worksheet.getRow(1).eachCell((cell) => {
                cell.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF0F766E' } };
                cell.font = { color: { argb: 'FFFFFFFF' }, bold: true, size: 12 };
                cell.alignment = { vertical: 'middle', horizontal: 'center' };
                cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
            });

            worksheet.eachRow((row, rowNumber) => {
                if(rowNumber > 1) {
                    row.eachCell((cell) => {
                        cell.border = { top: {style:'thin'}, left: {style:'thin'}, bottom: {style:'thin'}, right: {style:'thin'} };
                        cell.alignment = { vertical: 'middle', wrapText: true };
                    });
                }
            });

            const buffer = await workbook.xlsx.writeBuffer();
            const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = `Intern_Sentence_Vault_${getLocalDateStr()}.xlsx`;
            a.click();
            window.URL.revokeObjectURL(url);
        }

        // --- Smart Quiz Logic (SRS Algorithm) ---
        function initializeQuiz() {
            activeQuizList = sentenceVault.filter(s => (s.memorizeCount || 0) < 3);
            currentQuizIndex = 0; 
            isCardFlipped = false;
            document.getElementById('quiz-remaining-count').textContent = activeQuizList.length;
            renderQuiz();
        }

        function flipCard() {
            if(!isCardFlipped) {
                isCardFlipped = true;
                document.getElementById('flashcard-inner').classList.add('rotate-y-180');
            }
        }

        function handleQuizAnswer(type) {
            const item = activeQuizList[currentQuizIndex];
            const idx = sentenceVault.findIndex(s => s.id === item.id);
            
            if (idx > -1) {
                if(type === 'known') {
                    sentenceVault[idx].memorizeCount = (sentenceVault[idx].memorizeCount || 0) + 1;
                    if(sentenceVault[idx].memorizeCount >= 3) {
                        activeQuizList.splice(currentQuizIndex, 1);
                        currentQuizIndex--;
                    }
                } else if (type === 'unknown') {
                    sentenceVault[idx].memorizeCount = 0;
                }
            }
            
            persistState(); 
            
            currentQuizIndex++;
            if(currentQuizIndex >= activeQuizList.length) currentQuizIndex = 0;
            
            isCardFlipped = false; 
            document.getElementById('quiz-remaining-count').textContent = activeQuizList.length;
            renderQuiz();
        }

        function resetMemorized() {
            if(confirm("모든 문장의 암기 누적 횟수를 0으로 초기화하시겠습니까?")) {
                sentenceVault.forEach(s => s.memorizeCount = 0);
                persistState();
                initializeQuiz();
            }
        }

        function renderQuiz() {
            const container = document.getElementById('quiz-container');
            if(activeQuizList.length === 0) {
                container.innerHTML = `<div class="text-center p-10 mt-10"><div class="text-6xl mb-4">🏆</div><h3 class="text-2xl font-black text-slate-800 mb-2">모든 문장 마스터 완료!</h3><p class="text-slate-500">더 이상 복습할 카드가 없습니다.</p></div>`;
                return;
            }
            
            const s = activeQuizList[currentQuizIndex];
            const currentStreak = s.memorizeCount || 0;
            
            const streakDots = [1, 2, 3].map(i => `<div class="w-3 h-3 rounded-full ${i <= currentStreak ? 'bg-emerald-400' : 'bg-slate-600/50'}"></div>`).join('');

            container.innerHTML = `
                <div class="relative w-full max-w-sm mx-auto aspect-[4/5] perspective-1000 cursor-pointer mb-8 group" onclick="flipCard()">
                    <div id="flashcard-inner" class="w-full h-full transition-transform duration-500 transform-style-preserve-3d">
                        <div class="absolute w-full h-full backface-hidden bg-white rounded-3xl shadow-xl flex flex-col justify-center items-center p-8 border border-slate-200 group-hover:shadow-2xl transition-shadow">
                            <span class="absolute top-8 px-3 py-1 bg-slate-100 text-slate-500 text-[10px] font-black rounded border tracking-wider">${s.tag}</span>
                            
                            <h3 class="text-2xl font-black text-center text-slate-800 leading-snug break-keep">${s.meaning}</h3>
                            
                            <div class="absolute bottom-8 flex flex-col items-center gap-2">
                                <span class="flex gap-1.5 mb-2">${streakDots}</span>
                                <p class="text-[10px] text-brand font-bold bg-brand/10 px-3 py-1 rounded-full animate-pulse">탭하여 원문 확인</p>
                            </div>
                        </div>
                        
                        <div class="absolute w-full h-full backface-hidden rotate-y-180 bg-brand-dark rounded-3xl shadow-2xl flex flex-col p-6 text-white border border-brand">
                            <div class="flex-1 flex flex-col justify-center items-center text-center">
                                <h3 class="text-2xl sm:text-3xl font-black italic mb-6 leading-tight text-white">"${s.original}"</h3>
                                ${s.applied ? `<div class="w-full p-4 bg-white/10 rounded-2xl text-left border border-white/10"><div class="text-[9px] text-brand-light mb-1 font-black uppercase tracking-widest">Business Case</div><div class="text-sm font-semibold">${s.applied}</div></div>` : ''}
                            </div>
                            
                            <div class="flex gap-2 mt-4">
                                <button onclick="event.stopPropagation(); handleQuizAnswer('unknown')" class="flex-1 py-3 bg-red-500/20 rounded-xl text-xs font-bold text-red-100 border border-red-500/50 hover:bg-red-500 transition-colors">암기 필요(중요!)</button>
                                <button onclick="event.stopPropagation(); handleQuizAnswer('hold')" class="flex-[0.8] py-3 bg-slate-700 rounded-xl text-xs font-bold border border-slate-600 hover:bg-slate-600 transition-colors">보류</button>
                                <button onclick="event.stopPropagation(); handleQuizAnswer('known')" class="flex-[1.2] py-3 bg-emerald-500 rounded-xl text-xs font-bold shadow-[0_0_15px_rgba(16,185,129,0.3)] hover:bg-emerald-400 transition-colors flex flex-col items-center justify-center gap-0.5">
                                    <span>암기 완료</span>
                                    <span class="text-[9px] font-medium text-emerald-100 opacity-90">(${currentStreak + 1}/3 누적)</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function changeMonth(off) { viewDate.setMonth(viewDate.getMonth() + off); renderAll(); }
        async function initializeData() {
            if(confirm('진도 데이터만 초기화합니다. (문장 저장소는 유지됩니다)')) {
                startDateStr = getLocalDateStr();
                completedTasks = [];
                activeQuote = null;
                completedDateForQuote = null;
                await persistState();
                renderAll();
            }
        }
        
        window.onload = async () => {
            await loadStateFromFirebase();
            renderCategories();
            renderAll();
        };
    </script>
</body>
</html>
