<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - The Intern Study Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

        // 기존 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyAX0nQdaC7vkLAOGDize2q5gRlagSRlo6k",
            authDomain: "english-study-b3253.firebaseapp.com",
            databaseURL: "https://english-study-b3253-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "english-study-b3253",
            storageBucket: "english-study-b3253.firebasestorage.app",
            messagingSenderId: "429046264345",
            appId: "1:429046264345:web:9c3fef7f3a606f261bb088"
        };

        // Firebase 및 Auth 초기화
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // 로그인 폼 제출 이벤트 설정
        document.addEventListener('DOMContentLoaded', () => {
            const loginForm = document.getElementById('login-form');
            const loginBtn = document.getElementById('login-btn');

            loginForm.addEventListener('submit', async (e) => {
                e.preventDefault(); // 폼 기본 제출 방지 (페이지 새로고침 방지)
                
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;

                if (!email || !password) {
                    alert("이메일과 비밀번호를 모두 입력해주세요.");
                    return;
                }

                // 버튼 상태 변경 (로딩 중)
                const originalBtnText = loginBtn.innerText;
                loginBtn.innerText = "로그인 중...";
                loginBtn.disabled = true;
                loginBtn.classList.add('opacity-70', 'cursor-not-allowed');

                try {
                    // Firebase 로그인 요청
                    const userCredential = await signInWithEmailAndPassword(auth, email, password);
                    const user = userCredential.user;
                    
                    // 로그인 성공 시 메인 페이지로 이동
                    window.location.href = "./index.html";
                } catch (error) {
                    console.error("Login Error:", error);
                    
                    // 에러 코드에 따른 한국어 메시지 처리
                    let errorMessage = "로그인에 실패했습니다. 다시 시도해주세요.";
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password' || error.code === 'auth/user-not-found') {
                        errorMessage = "이메일 또는 비밀번호가 올바르지 않습니다.";
                    } else if (error.code === 'auth/invalid-email') {
                        errorMessage = "유효하지 않은 이메일 형식입니다.";
                    } else if (error.code === 'auth/too-many-requests') {
                        errorMessage = "로그인 시도를 너무 많이 했습니다. 잠시 후 다시 시도해주세요.";
                    }

                    alert(errorMessage);
                } finally {
                    // 버튼 상태 복구
                    loginBtn.innerText = originalBtnText;
                    loginBtn.disabled = false;
                    loginBtn.classList.remove('opacity-70', 'cursor-not-allowed');
                }
            });
        });
    </script>
</head>
<body class="min-h-screen bg-slate-50 flex items-center justify-center p-4">
    <main class="w-full max-w-md bg-white rounded-2xl shadow-sm border border-slate-100 p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-2">로그인</h1>
        <p class="text-sm text-slate-500 mb-6">계정으로 로그인하세요.</p>

        <form id="login-form" class="space-y-4">
            <div>
                <label for="email" class="block text-sm font-semibold text-slate-700 mb-1">이메일</label>
                <input id="email" type="email" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-teal-600" placeholder="you@example.com">
            </div>
            <div>
                <label for="password" class="block text-sm font-semibold text-slate-700 mb-1">비밀번호</label>
                <input id="password" type="password" required class="w-full p-3 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-teal-600" placeholder="••••••••">
            </div>
            <button id="login-btn" type="submit" class="w-full py-3 bg-teal-700 text-white font-bold rounded-xl hover:bg-teal-800 transition-colors">로그인</button>
        </form>
        
        <a href="./signup.html" class="block w-full text-center py-3 mt-3 bg-white border border-teal-700 text-teal-700 font-bold rounded-xl hover:bg-teal-50 transition-colors">회원가입</a>

        <a href="./index.html" class="block text-center text-sm text-slate-500 mt-6 hover:text-slate-700">메인으로 돌아가기</a>
    </main>
</body>
</html>
